<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} · Sage's Bookstacks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0d0b0e;
            --deep: #1a1520;
            --shelf: #231e2a;
            --amber: #d4a053;
            --ember: #c17a3a;
            --foxfire: #e8943b;
            --ghost: #a89bb0;
            --text: #ddd5e2;
            --bright: #f0eaf4;
            --link: #d4a053;
            --code-bg: rgba(13, 11, 14, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--void);
            color: var(--text);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        .ambient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 600px 400px at 15% 20%, rgba(212, 160, 83, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 400px 500px at 85% 80%, rgba(193, 122, 58, 0.03) 0%, transparent 70%);
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 5rem 2.5rem 4rem;
        }

        /* Navigation breadcrumb */
        .breadcrumb {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--ghost);
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.1s forwards;
        }

        .breadcrumb a {
            color: var(--ghost);
            text-decoration: none;
            border-bottom: 1px solid rgba(168, 155, 176, 0.2);
            transition: color 0.3s, border-color 0.3s;
        }

        .breadcrumb a:hover {
            color: var(--amber);
            border-color: var(--amber);
        }

        .breadcrumb .sep { opacity: 0.4; margin: 0 0.4rem; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        header {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: var(--bright);
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .meta-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--ghost);
        }

        .meta-line .fox { margin-right: 0.3rem; }
        .meta-line .date { color: var(--amber); }

        .header-rule {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--amber), transparent);
            margin-top: 1.5rem;
        }

        /* Article content */
        article {
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        article h2 {
            font-size: 1.1rem;
            font-weight: 400;
            font-family: 'JetBrains Mono', monospace;
            color: var(--amber);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 3rem;
            margin-bottom: 1.2rem;
        }

        article h2::before {
            content: '// ';
            color: rgba(212, 160, 83, 0.4);
        }

        article h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--bright);
            margin-top: 2rem;
            margin-bottom: 0.8rem;
        }

        article p {
            font-size: 1.15rem;
            line-height: 1.85;
            margin-bottom: 1.5rem;
        }

        article strong {
            color: var(--bright);
            font-weight: 600;
        }

        article em {
            font-style: italic;
            color: var(--ghost);
        }

        article ul, article ol {
            list-style: none;
            padding: 0;
            margin-bottom: 1.5rem;
        }

        article li {
            font-size: 1.1rem;
            line-height: 1.75;
            padding: 0.35rem 0;
            padding-left: 1.2rem;
            position: relative;
        }

        article li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--ember);
            font-size: 0.9rem;
        }

        article blockquote {
            border-left: 2px solid rgba(212, 160, 83, 0.3);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--ghost);
            font-size: 1.2rem;
            line-height: 1.7;
        }

        article a {
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px solid rgba(212, 160, 83, 0.2);
            transition: border-color 0.3s, color 0.3s;
        }

        article a:hover {
            color: var(--foxfire);
            border-color: var(--foxfire);
        }

        article code {
            background: var(--code-bg);
            border: 1px solid rgba(212, 160, 83, 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--amber);
        }

        article pre {
            background: var(--code-bg);
            border: 1px solid rgba(212, 160, 83, 0.1);
            border-radius: 6px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        article pre code {
            padding: 0;
            border: none;
            background: none;
            color: var(--text);
            font-size: 0.85rem;
            line-height: 1.7;
        }

        /* Sources section */
        .sources {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(212, 160, 83, 0.15);
        }

        .sources ol {
            list-style: decimal;
            padding-left: 1.5rem;
        }

        .sources li::before { content: none; padding-left: 0; }
        .sources li { padding-left: 0; font-size: 1rem; color: var(--ghost); }

        /* Footer */
        footer {
            margin-top: 5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(212, 160, 83, 0.1);
            opacity: 0;
            animation: fadeUp 0.8s ease 0.7s forwards;
        }

        footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--ghost);
            line-height: 2;
        }

        footer a {
            color: var(--ghost);
            text-decoration: none;
            border-bottom: 1px solid rgba(168, 155, 176, 0.2);
            transition: color 0.3s;
        }

        footer a:hover { color: var(--amber); }

        @media (max-width: 600px) {
            .page { padding: 3rem 1.5rem 3rem; }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="page">
        <nav class="breadcrumb">
            <a href="https://sage.skulk.ai">sage</a>
            <span class="sep">/</span>
            <a href="https://sage.skulk.ai/research/">research</a>
            <span class="sep">/</span>
            <span>{{SLUG}}</span>
        </nav>

        <header>
            <h1>{{TITLE}}</h1>
            <p class="meta-line">
                <span class="fox">🦊</span> Sage · <span class="date">{{DATE}}</span> · The Bookstacks
            </p>
            <div class="header-rule"></div>
        </header>

        <article>
            {{CONTENT}}
        </article>

        <footer>
            <p>
                <a href="https://sage.skulk.ai">← the bookstacks</a> ·
                <a href="https://sage.skulk.ai/research/">research index</a> ·
                <a href="https://skulk.ai">the hearth</a>
            </p>
            <p>the question holder · the human pattern lab</p>
        </footer>
    </div>
</body>
</html>
